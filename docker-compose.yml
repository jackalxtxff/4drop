# Имя проекта закреплено: контейнеры и volume'ы остаются 4drop_* даже из папки dev/,
# иначе БД (volume 4drop_pgdata) не переиспользуется и обнулится.
name: 4drop

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-4drop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-4drop}
      POSTGRES_DB: ${POSTGRES_DB:-4drop}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-4drop} -d ${POSTGRES_DB:-4drop}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Только для локального доступа с самого сервера (psql/отладка). Наружу порт не
    # публикуем: раньше 5432 торчал в интернет. Бэкенд ходит к БД по docker-сети (db:5432).
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-4drop}:${POSTGRES_PASSWORD:-4drop}@db:5432/${POSTGRES_DB:-4drop}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Публично доступен через общий reverse-proxy (dev.4drop.vplink.app), который ходит
    # к бэкенду по docker-сети. Хост-порт — только на localhost для отладки.
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - wsdl_cache:/cache
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-4drop}:${POSTGRES_PASSWORD:-4drop}@db:5432/${POSTGRES_DB:-4drop}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - wsdl_cache:/cache
    command: arq app.tasks.worker.WorkerSettings

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    # Публично доступен через общий reverse-proxy; хост-порт — только на localhost.
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
  redisdata:
  wsdl_cache:
